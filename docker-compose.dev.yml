services:
  frontend-dev:
    container_name: rtm-class-frontend-dev
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://backend.rtm-corndog.my.id/api/v1}
      NEXT_PUBLIC_CLIENT_DOMAIN: ${NEXT_PUBLIC_CLIENT_DOMAIN:-http://localhost:3000}
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
