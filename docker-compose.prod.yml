services:
  frontend:
    container_name: rtm-class-frontend
    build:
      context: .
      target: runner
    image: rtm-class-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://backend.rtm-corndog.my.id/api/v1}
      NEXT_PUBLIC_CLIENT_DOMAIN: ${NEXT_PUBLIC_CLIENT_DOMAIN:-https://frontend.rtm-corndog.my.id}
    restart: unless-stopped
